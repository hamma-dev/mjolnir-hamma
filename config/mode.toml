# Shared config mode preset configuration

config_version = 1

# Preset for real-time use, e.g. coupled with Sindri
[realtime]
    [realtime.main.general]
        output_path_client = "~/brokkr/realtime"

    [realtime.main.pipelines.telemetry]
        monitor_interval_s = 1

# Preset for real-time use with Sindri 0.2.x
[sindri02x]
    [sindri02x.main.pipelines.telemetry]
        monitor_interval_s = 10

# Preset for core and system testing without disturbing the production data
[test]
    [test.main.general]
        output_path_client = "~/brokkr/test"

    [test.main.pipelines.telemetry]
        monitor_interval_s = 5

    [test.main.steps.state_monitor]
        _enabled = false

    [test.main.steps.hamma_plot]
        _enabled = false

    [test.main.steps.hamma_plot_rsync]
        _enabled = false

    [test.main.steps.realtime_output_queue]
        _enabled = false

    [test.main.steps.realtime_input_queue]
        _enabled = false

    [test.main.pipelines.realtime]
        _enabled = false

    [test.main.pipelines.rsync_hamma_realtime]
        _enabled = false

# Preset for units without HAMMA sensor hardware connected
# Disables all science data pipelines and drive checks, keeps telemetry/monitoring
[nosensor]
    [nosensor.main.steps.state_monitor]
        enable_drive_checks = false

    [nosensor.main.pipelines.science_ingest]
        _enabled = false

    [nosensor.main.pipelines.science_disk_write]
        _enabled = false

    [nosensor.main.pipelines.science_header_decode]
        _enabled = false

    [nosensor.main.pipelines.realtime]
        _enabled = false

    [nosensor.main.pipelines.rsync_hamma_realtime]
        _enabled = false

# Preset for units without a charge controller connected
# Removes sunsaver input from telemetry; can combine with nosensor
[nochargecontroller]
    [nochargecontroller.main.pipelines.telemetry]
        monitor_input_steps = [
            "builtins.inputs.current_time",
            "builtins.inputs.run_time",
            "hamma2.inputs.ping",
            "hamma2.inputs.hs",
        ]
